{% extends 'base.html' %}
{% block title %}登录 - 缘来如此{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-heart text-pink fa-3x mb-3"></i>
                        <h3 class="fw-bold">欢迎回来</h3>
                        <p class="text-muted">登录你的账号继续探索</p>
                    </div>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">用户名或邮箱</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" class="form-control" required placeholder="请输入用户名或邮箱">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" required placeholder="请输入密码">
                            </div>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="remember" id="remember">
                            <label class="form-check-label" for="remember">记住我</label>
                        </div>
                        <button type="submit" class="btn btn-pink w-100 btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>登录
                        </button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <p class="mb-0">还没有账号？
                            <a href="{{ url_for('auth.register') }}" class="text-pink fw-bold">立即注册</a>
                        </p>
                    </div>
                    <div class="mt-3 p-2 bg-light rounded small text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        管理员账号：admin / admin123
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
