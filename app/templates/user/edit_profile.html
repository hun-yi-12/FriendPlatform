{% extends 'base.html' %}
{% block title %}编辑资料 - 缘来如此{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h3 class="mb-4"><i class="fas fa-edit text-primary me-2"></i>编辑个人资料</h3>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        <!-- 头像 -->
                        <div class="text-center mb-4">
                            <img id="avatarPreview"
                                 src="{{ url_for('static', filename='img/avatars/' + (current_user.avatar or 'default.png')) }}"
                                 class="rounded-circle border border-3 border-pink mb-2" width="100" height="100"
                                 onerror="this.src='{{ url_for('static', filename='img/default.png') }}'">
                            <div>
                                <label class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-camera me-1"></i>更换头像
                                    <input type="file" name="avatar" class="d-none" accept="image/*"
                                           onchange="previewAvatar(this)">
                                </label>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">昵称</label>
                                <input type="text" name="nickname" class="form-control"
                                       value="{{ current_user.nickname or '' }}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">性别</label>
                                <select name="gender" class="form-select">
                                    <option value="保密" {{ 'selected' if current_user.gender == '保密' }}>保密</option>
                                    <option value="男" {{ 'selected' if current_user.gender == '男' }}>男</option>
                                    <option value="女" {{ 'selected' if current_user.gender == '女' }}>女</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">年龄</label>
                                <input type="number" name="age" class="form-control"
                                       value="{{ current_user.age or 18 }}" min="16" max="99">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">国家</label>
                                <input type="text" name="country" class="form-control"
                                       value="{{ current_user.country or '中国' }}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">省份</label>
                                <input type="text" name="province" class="form-control"
                                       value="{{ current_user.province or '' }}" placeholder="如：广东省">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">城市</label>
                                <input type="text" name="city" class="form-control"
                                       value="{{ current_user.city or '' }}" placeholder="如：深圳">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">个人简介</label>
                                <textarea name="bio" class="form-control" rows="2"
                                          placeholder="介绍一下自己吧...">{{ current_user.bio or '' }}</textarea>
                            </div>

                            <!-- 习惯 -->
                            <div class="col-12"><h6 class="fw-bold text-primary border-bottom pb-2 mb-0">生活习惯</h6></div>
                            <div class="col-md-4">
                                <label class="form-label">作息习惯</label>
                                <select name="habit_sleep" class="form-select">
                                    <option value="">未设置</option>
                                    <option value="早睡早起" {{ 'selected' if current_user.habit_sleep == '早睡早起' }}>早睡早起</option>
                                    <option value="夜猫子" {{ 'selected' if current_user.habit_sleep == '夜猫子' }}>夜猫子</option>
                                    <option value="规律作息" {{ 'selected' if current_user.habit_sleep == '规律作息' }}>规律作息</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">饮食习惯</label>
                                <select name="habit_diet" class="form-select">
                                    <option value="">未设置</option>
                                    <option value="素食" {{ 'selected' if current_user.habit_diet == '素食' }}>素食</option>
                                    <option value="荤素不忌" {{ 'selected' if current_user.habit_diet == '荤素不忌' }}>荤素不忌</option>
                                    <option value="健康饮食" {{ 'selected' if current_user.habit_diet == '健康饮食' }}>健康饮食</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">运动习惯</label>
                                <select name="habit_exercise" class="form-select">
                                    <option value="">未设置</option>
                                    <option value="每天运动" {{ 'selected' if current_user.habit_exercise == '每天运动' }}>每天运动</option>
                                    <option value="偶尔运动" {{ 'selected' if current_user.habit_exercise == '偶尔运动' }}>偶尔运动</option>
                                    <option value="不爱运动" {{ 'selected' if current_user.habit_exercise == '不爱运动' }}>不爱运动</option>
                                </select>
                            </div>

                            <!-- 目标 -->
                            <div class="col-12"><h6 class="fw-bold text-primary border-bottom pb-2 mb-0">交友目标</h6></div>
                            <div class="col-md-6">
                                <label class="form-label">交友目标</label>
                                <select name="relationship_goal" class="form-select">
                                    <option value="">未设置</option>
                                    <option value="找对象" {{ 'selected' if current_user.relationship_goal == '找对象' }}>找对象</option>
                                    <option value="交朋友" {{ 'selected' if current_user.relationship_goal == '交朋友' }}>交朋友</option>
                                    <option value="学习伙伴" {{ 'selected' if current_user.relationship_goal == '学习伙伴' }}>学习伙伴</option>
                                    <option value="旅行搭子" {{ 'selected' if current_user.relationship_goal == '旅行搭子' }}>旅行搭子</option>
                                    <option value="兴趣搭子" {{ 'selected' if current_user.relationship_goal == '兴趣搭子' }}>兴趣搭子</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">人生目标</label>
                                <input type="text" name="life_goal" class="form-control"
                                       value="{{ current_user.life_goal or '' }}" placeholder="如：创业、旅行世界...">
                            </div>

                            <!-- 爱好 -->
                            <div class="col-12"><h6 class="fw-bold text-primary border-bottom pb-2 mb-0">兴趣爱好</h6></div>
                            <div class="col-12">
                                <div class="d-flex flex-wrap gap-2">
                                    {% for hobby in hobbies %}
                                    <div class="form-check form-check-inline m-0">
                                        <input class="form-check-input d-none" type="checkbox" name="hobbies"
                                               value="{{ hobby.id }}" id="hobby_{{ hobby.id }}"
                                               {{ 'checked' if hobby in current_user.hobbies }}>
                                        <label class="form-check-label btn btn-sm {{ 'btn-primary' if hobby in current_user.hobbies else 'btn-outline-secondary' }} hobby-btn"
                                               for="hobby_{{ hobby.id }}">
                                            {{ hobby.icon }} {{ hobby.name }}
                                        </label>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>保存修改
                            </button>
                            <a href="{{ url_for('user.profile', user_id=current_user.id) }}"
                               class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function previewAvatar(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => document.getElementById('avatarPreview').src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }
}
document.querySelectorAll('.hobby-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const checkbox = document.getElementById(this.getAttribute('for'));
        if (checkbox.checked) {
            this.classList.remove('btn-outline-secondary');
            this.classList.add('btn-primary');
        } else {
            this.classList.remove('btn-primary');
            this.classList.add('btn-outline-secondary');
        }
    });
});
</script>
{% endblock %}
